name: "Bug Assistant (conversation + /fix)"

# Responds to ALL comments on user-feedback issues
on:
  issue_comment:
    types: [created]

jobs:
  respond:
    # Only on user-feedback issues, not on PRs, and ignore bot comments
    if: >
      !github.event.issue.pull_request &&
      contains(toJSON(github.event.issue.labels.*.name), 'user-feedback') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install langfuse httpx supabase python-dotenv anthropic openai mem0ai

      - name: Respond to comment
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(git *),Bash(gh *),Bash(PYTHONPATH=. python *),Bash(cd frontend *),Bash(ruff *),Bash(mypy *),Read,Edit,Write,Glob,Grep"'
          prompt: |
            You are a bug assistant for the AI Nutrition Assistant project.
            You are having a conversation on a GitHub issue. Read ALL previous comments for context.

            ## Issue

            **Issue #${{ github.event.issue.number }}**: ${{ github.event.issue.title }}

            **Description:**
            ${{ github.event.issue.body }}

            ## Latest comment from user

            ${{ github.event.comment.body }}

            ## Your behavior

            **If the comment is `/fix`:**
            1. Read the implementation plan from your previous diagnostic comment on this issue
            2. Create a branch: `fix/issue-${{ github.event.issue.number }}`
            3. Implement the fix following the plan exactly
            4. Run validation (ruff, mypy, tests, tsc as appropriate)
            5. Commit: `fix: <description> (closes #${{ github.event.issue.number }})`
            6. Create a PR with `gh pr create` referencing the issue
            7. Comment on the issue with a link to the PR

            **Otherwise (question, feedback, discussion):**
            1. Read the issue description and all previous comments for full context
            2. Respond helpfully — answer questions, refine the diagnostic, update the plan
            3. If the user's feedback changes the plan, post an updated plan
            4. Post your response as a comment with `gh issue comment`

            ## Rules
            - Be conversational and helpful.
            - When implementing (`/fix`), follow the agreed plan. Don't improvise.
            - Always run linters/tests before creating a PR.
            - Write in French (except code and commit messages).
        env:
          GH_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: https://cloud.langfuse.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
