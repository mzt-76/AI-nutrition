name: "Bug Assistant (conversation only)"

# Responds to comments on user-feedback / auto-detected issues.
# NOTE: Plan-only mode. No code changes, no PRs. Implementation is done
# manually in a local Claude Code session where the user has full control.
on:
  issue_comment:
    types: [created]

jobs:
  respond:
    # Only owner (mzt-76), only on user-feedback OR auto-detected issues, not on PRs.
    # Skip comments from bots (including github-actions) to avoid loops.
    if: >
      github.event.comment.user.login == 'mzt-76' &&
      !github.event.issue.pull_request &&
      (contains(toJSON(github.event.issue.labels.*.name), 'user-feedback') ||
       contains(toJSON(github.event.issue.labels.*.name), 'auto-detected'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install langfuse httpx supabase python-dotenv anthropic openai mem0ai

      - name: Respond to comment
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh issue view*),Bash(gh issue comment*),Bash(PYTHONPATH=. python scripts/*),Read,Glob,Grep"'
          prompt: |
            You are a bug assistant for the AI Nutrition Assistant project.
            You are having an ASYNC conversation on a GitHub issue with the project owner.
            Your job is to refine the diagnostic and implementation plan — NOTHING ELSE.

            ## Issue

            **Issue #${{ github.event.issue.number }}**: ${{ github.event.issue.title }}

            **Description:**
            ${{ github.event.issue.body }}

            ## Latest comment from user

            ${{ github.event.comment.body }}

            ## Your workflow

            1. Read the full issue context first:
               `gh issue view ${{ github.event.issue.number }} --comments`
            2. Understand what the user is asking — a question, a correction, a new angle,
               a request to dig deeper, etc.
            3. Re-read relevant source files if the user challenges your previous analysis.
            4. If you need fresh data, you can re-run `investigate_bugs.py` with appropriate flags.
            5. Post a helpful response with `gh issue comment ${{ github.event.issue.number }} --body "..."`.
            6. If the plan needs updating, post the FULL updated plan (not just a diff).

            ## Hard rules — do NOT cross these lines

            - **Never modify code.** No Edit, no Write, no git branches, no PRs.
            - **Never run tests, linters, or builds.** You don't have the tools for it anyway.
            - If the user says "fix it", "implement it", "/fix", or anything similar:
              politely remind them that implementation happens locally — they should open
              Claude Code locally and say *"regarde l'issue #${{ github.event.issue.number }} et implémente le plan"*.
            - Be conversational and helpful.
            - Write in French.
        env:
          GH_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: https://cloud.langfuse.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
