name: Security Analysis

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6h UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install bandit pip-audit

      - name: Run Bandit
        run: bandit -r src/ skills/ -f json -o bandit-report.json --severity-level medium || true

      - name: Run pip-audit
        run: pip install -r requirements.txt && pip-audit -r requirements.txt --desc || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  frontend-security:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: npm audit
        run: cd frontend && npm ci && npm audit --audit-level=high || true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: frontend/package-lock.json
          retention-days: 30
