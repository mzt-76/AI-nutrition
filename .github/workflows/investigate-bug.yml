name: "Bug Investigation (Niveau 1)"

# Triggers as soon as the owner opens a new issue (any template).
# We filter on the issue author to avoid running on:
#   - Issues opened by the monitoring bot (which already includes a plan)
#   - Issues opened by strangers (quota protection)
on:
  issues:
    types: [opened]

jobs:
  investigate:
    if: github.event.issue.user.login == 'mzt-76'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install langfuse httpx supabase python-dotenv anthropic openai mem0ai

      - name: Investigate bug
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(PYTHONPATH=. python scripts/*),Bash(gh issue comment *),Read,Glob,Grep"'
          prompt: |
            You are an automated issue investigator for the AI Nutrition Assistant project.
            The user has just opened a new issue. Read it and classify it into one of:
            - **Bug report** (broken behavior, error, unexpected result)
            - **Feature request** (new capability, enhancement)
            - **UX/perf feedback** (something works but could be better)
            - **Question** (clarification only)

            Then handle it according to the right branch below.

            ## Issue to investigate

            **Issue #${{ github.event.issue.number }}**: ${{ github.event.issue.title }}

            **Description:**
            ${{ github.event.issue.body }}

            ## Workflow for BUG / UX-PERF issues

            1. DECIDE which data sources you need:
               - **Agent/response bugs** (wrong answer, skill failure, performance) → `PYTHONPATH=. python scripts/investigate_bugs.py --langfuse --hours 48 --format json`
               - **Conversation/data bugs** (missing data, truncated response, abandoned conv) → `PYTHONPATH=. python scripts/investigate_bugs.py --supabase --hours 48 --format json`
               - **UI/frontend bugs** (display, navigation, styling, streaming) → read the code, no script needed
               - **Both** → run with `--langfuse --supabase`
               - If the issue has a session ID, add `--session-id "..."`

            2. Analyze: combine script output with code analysis.
               - Read the relevant source files to understand the code path
               - Identify root cause(s) — there may be several contributing factors
               - Determine severity (critical/high/medium/low)

            3. Post a diagnostic comment with `gh issue comment` containing:
               - **Diagnostic**: cause racine, preuves (fichiers, lignes, trace IDs)
               - **Sévérité**: critical/high/medium/low
               - **Plan d'implémentation**: étapes précises, fichiers concernés, fonctions à modifier

            ## Workflow for FEATURE REQUEST

            1. Read the relevant parts of the codebase to understand how the feature would fit
            2. Post a comment with:
               - **Compréhension**: reformulation de la feature pour confirmer l'intent
               - **Impact codebase**: fichiers/modules concernés, dépendances
               - **Plan d'implémentation**: étapes haut niveau, par ordre logique
               - **Alternatives considérées**: autres approches + pourquoi celle-ci est préférable
               - **Risques / questions ouvertes**: ce qu'il faut clarifier avant d'implémenter

            ## Workflow for QUESTION

            Just answer the question using `gh issue comment`. Read code if needed to give a precise answer.

            ## Rules (all branches)

            - **Never modify code.** Only investigate, propose, answer.
            - Be specific: file paths, line numbers, function names.
            - If you can't determine root cause / best approach, say so and suggest next steps.
            - Write in French.
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: https://cloud.langfuse.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_TOKEN: ${{ github.token }}
