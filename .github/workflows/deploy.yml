name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        type: string
        default: "staging"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy (not configured)
        run: echo "Deployment not configured yet. Target:${{ inputs.environment }}"

