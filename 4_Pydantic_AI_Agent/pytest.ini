[pytest]
# Pytest configuration for AI Nutrition Assistant

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore RAG_Pipeline tests (separate dependencies)
norecursedirs = RAG_Pipeline .git __pycache__ venv .mypy_cache

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output configuration
addopts = -v --tb=short

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring external services
